# Commands and Apps to be executed at launch

# Fix screen-sharing (Discord etc.): xdg-desktop-portal(-hyprland) erzwingen.
# Der Standard-Script PortalHyprlandUbuntu.sh startet die Portals nur auf Ubuntu-Distros,
# und diese Session ist nicht uwsm-verwaltet -> systemd zieht graphical-session.target nicht
# hoch, weshalb xdg-desktop-portal.service (Requisite=graphical-session.target) nie startet.
# PortalHyprland.sh startet die Portal-Binaries direkt und umgeht das.
exec-once = $HOME/.config/hypr/scripts/PortalHyprland.sh

exec-once = $SwwwRandom  # random wallpaper switcher every 30 minutes
# exec-once = qs # quickshell AGS Desktop Overview alternative
exec-once = sh -c 'sleep 1 && hyprctl dispatch workspace 2'
exec-once = [workspace 1] kitty
exec-once = [workspace 2] code
exec-once = [workspace 2] firedragon --restore
exec-once = [workspace 2] kitty
exec-once = [workspace special spotify] sh -c 'sleep 2 && spotify'
