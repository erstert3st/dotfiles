# Decoration Settings

# Hyprland Wiki Links
# Animation - https://wiki.hyprland.org/Configuring/Animations/
# Decoration - https://wiki.hyprland.org/Configuring/Variables/#decoration

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf

general {
  border_size = 1
  gaps_in = 1
  gaps_out = 1

  col.active_border = $color12
  # col.inactive_border = $color1 rgba(00000000)
  col.inactive_border =  rgba(00000000)
}

decoration {
  rounding = 10
  
  active_opacity = 1.079
  inactive_opacity = 1.2
  fullscreen_opacity = 1.0

  dim_inactive = true
  dim_strength = 0.3
  dim_special = 0.8

  shadow {
    enabled = true
    range = 3
    render_power = 1

    color =  $color12
    color_inactive = $color10
  }

  blur {
    enabled = false
    size = 2
    passes = 2
    new_optimizations = true
    xray = true
    ignore_opacity = true
    special = true
    popups = true
  }
}

group {
  col.border_active = $color15

	groupbar {
		col.active = $color0
  }
}
